<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>2n+1 · Pattern Analyzer (Lightweight)</title>
  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', 'Fira Code', monospace; }
    body { background: #0b1016; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .app { max-width: 1400px; width: 100%; background: #16202a; border-radius: 36px; box-shadow: 0 20px 40px #00000060, 0 0 0 1px #3e5a70; padding: 24px 30px; color: #e3ecf5; }
    h1 { margin: 0 0 6px; font-weight: 450; font-size: 2rem; background: linear-gradient(145deg, #f2d98b, #b0d0ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .subtitle { margin-left: 12px; margin-bottom: 20px; color: #aac1da; border-left: 5px solid #d9a822; padding-left: 22px; }
    .panel { background: #101b25; border-radius: 28px; padding: 22px 24px; border: 1px solid #2e4a5e; margin-bottom: 20px; }
    .flex-row { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; }
    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-group label { font-weight: 600; color: #b0cce6; }
    .input-group input, .input-group textarea { background: #0c1721; border: 1px solid #456983; padding: 12px 18px; border-radius: 20px; font-size: 1rem; color: #ffe9b6; font-family: 'Fira Code', monospace; outline: none; }
    button { background: #1e4b6e; border: 1px solid #8bb1d4; color: white; font-weight: bold; padding: 12px 28px; border-radius: 60px; cursor: pointer; font-size: 1rem; transition: 0.15s; }
    button:hover { background: #2f6790; box-shadow: 0 0 12px #6f9ac2; }
    button.small { padding: 6px 16px; font-size: 0.9rem; }
    .result-box { background: #0b1722; border-radius: 20px; padding: 20px; margin-top: 20px; border-left: 6px solid #e6b422; }
    .pattern-display { font-family: 'Fira Code', monospace; font-size: 1.2rem; background: #0a131c; padding: 12px; border-radius: 12px; word-break: break-all; }
    .highlight-green { background: #1b5e1b; color: #bef5b4; padding: 2px 4px; border-radius: 6px; }
    .highlight-red { background: #962828; color: #ffcfcf; padding: 2px 4px; border-radius: 6px; }
    .block-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
    .block-tag { background: #1a3345; padding: 4px 12px; border-radius: 20px; font-family: 'Fira Code'; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, auto)); gap: 12px; margin-top: 15px; }
    .stat-item { background: #0f1922; padding: 12px; border-radius: 16px; }
    .warning { color: #f0b37b; }
    .success { color: #8fc99c; }
  </style>
</head>
<body>
<div class="app">
  <h1> Pattern Analyzer · Mersenne vs. Non‑Mersenne</h1>
  <div class="subtitle">Analyze operation patterns · Find what separates true Mersenne exponents</div>

  <div class="panel">
    <div class="section-title"> Analyze Candidate p</div>
    <div class="flex-row">
      <div class="input-group" style="flex:2;">
        <label>Enter p (or paste comma/tab/newline separated list)</label>
        <textarea id="pInput" rows="3" placeholder="e.g. 21701, 44497, 86243">21701, 44497, 86243</textarea>
      </div>
      <button id="analyzeBtn">Analyze</button>
      <button id="clearBtn">Clear</button>
    </div>
    <div style="margin:15px 0;">
      <label><input type="checkbox" id="compareMersenne" checked> Compare against known Mersenne patterns</label>
      <label style="margin-left:20px;"><input type="checkbox" id="showFullPattern"> Show full pattern string</label>
    </div>

    <div id="resultsContainer"></div>
  </div>

  <div class="panel">
    <div class="section-title"> Known Mersenne Block Library</div>
    <div id="blockLibrary" class="block-list"></div>
    <div style="margin-top:10px; color:#9fb7d0; font-size:0.9rem;">
      These blocks appear repeatedly in known Mersenne exponent patterns.
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  // ----- Known Mersenne exponents (p) and their patterns -----
  const knownMersenneP = new Set([
    3,5,7,13,17,19,31,61,89,107,127,521,607,1279,2203,2281,3217,4253,4423,9689,9941,
    11213,19937,21701,23209,44497,86243,110503,132049,216091,756839,859433,1257787,
    1398269,2976221,3021377,6972593,13466917,20996011,24036583,25964951,30402457,
    32582657,37156667,42643801,43112609,57885161,74207281,77232917,82589933,136279841
  ]);

  // Known Mersenne patterns (from lattice data)
  const knownPatterns = [
    { p: 5, pattern: "1" },
    { p: 7, pattern: "1" },
    { p: 13, pattern: "01" },
    { p: 17, pattern: "001" },
    { p: 19, pattern: "011" },
    { p: 31, pattern: "111" },
    { p: 61, pattern: "1101" },
    { p: 89, pattern: "11001" },
    { p: 107, pattern: "01011" },
    { p: 127, pattern: "11111" },
    { p: 521, pattern: "00001001" },
    { p: 607, pattern: "01011111" },
    { p: 1279, pattern: "011111111" },
    { p: 2203, pattern: "0010011011" },
    { p: 2281, pattern: "0011101001" },
    { p: 3217, pattern: "0010010001" },
    { p: 4253, pattern: "00010011101" },
    { p: 4423, pattern: "00101000111" },
    { p: 9689, pattern: "010111011001" },
    { p: 9941, pattern: "011011010101" },
    { p: 11213, pattern: "101111001101" },
    { p: 19937, pattern: "0110111100001" },
    { p: 21701, pattern: "1010011000101" },
    { p: 23209, pattern: "1101010101001" },
    { p: 44497, pattern: "10110111010001" },
    { p: 86243, pattern: "101000011100011" },
  ];

  // Common blocks extracted from known patterns
  const commonBlocks = ["1", "01", "001", "011", "111", "1101", "11001", "01011", "11111", "00001001"];
  
  // Build block library display
  const blockLibraryDiv = document.getElementById('blockLibrary');
  blockLibraryDiv.innerHTML = commonBlocks.map(b => `<span class="block-tag">"${b}"</span>`).join(' ');

  // ----- Helpers -----
  function detectBase(p) {
    let val = BigInt(p);
    while (val > 3n) {
      if (val % 2n === 0n) val = val / 2n;
      else val = (val - 1n) / 2n;
    }
    return Number(val);
  }

  function getPattern(p) {
    let val = BigInt(p);
    const bits = [];
    const base = detectBase(p);
    let cur = BigInt(base);
    // We need to reconstruct forward from base to p
    // Better: reverse from p down to base
    let temp = BigInt(p);
    const revBits = [];
    while (temp > 3n) {
      if (temp % 2n === 0n) {
        revBits.push('0');
        temp = temp / 2n;
      } else {
        revBits.push('1');
        temp = (temp - 1n) / 2n;
      }
    }
    return revBits.reverse().join('');
  }

  function countBlockOccurrences(pattern, blocks) {
    const counts = {};
    blocks.forEach(block => { counts[block] = 0; });
    
    for (let block of blocks) {
      let pos = 0;
      while ((pos = pattern.indexOf(block, pos)) !== -1) {
        counts[block]++;
        pos += block.length;
      }
    }
    return counts;
  }

  function findUnusualSubstrings(pattern, knownPatterns) {
    const unusual = [];
    // Check for long runs of zeros
    if (pattern.includes('0000')) unusual.push('Contains "0000" (long zero run)');
    if (pattern.includes('11111') && !pattern.includes('111111')) {
      // five 1s is okay (like 127), but check context
    }
    // Check for patterns not in any known Mersenne
    const windowSize = 4;
    for (let i = 0; i <= pattern.length - windowSize; i++) {
      const sub = pattern.substring(i, i + windowSize);
      let found = false;
      for (let kp of knownPatterns) {
        if (kp.pattern.includes(sub)) { found = true; break; }
      }
      if (!found) unusual.push(`Substring "${sub}" not found in known Mersenne patterns`);
    }
    return [...new Set(unusual)].slice(0, 5); // Limit to 5
  }

  function analyzeNumber(pStr) {
    try {
      const p = BigInt(pStr);
      const pNum = Number(p);
      const base = detectBase(p);
      const pattern = getPattern(p);
      const isMersenne = knownMersenneP.has(pNum);
      
      // Block analysis
      const blockCounts = countBlockOccurrences(pattern, commonBlocks);
      const totalBlocks = Object.values(blockCounts).reduce((a,b) => a+b, 0);
      
      // Compare with known patterns
      let similarTo = [];
      if (document.getElementById('compareMersenne').checked) {
        for (let kp of knownPatterns) {
          if (kp.pattern === pattern) {
            similarTo.push(`p=${kp.p}`);
          }
        }
      }
      
      const unusual = findUnusualSubstrings(pattern, knownPatterns);
      
      return {
        p: pStr,
        base,
        pattern,
        patternLength: pattern.length,
        blockCounts,
        totalBlocks,
        isMersenne,
        similarTo,
        unusual,
      };
    } catch (e) {
      return { error: e.message, p: pStr };
    }
  }

  function renderResults(analyses) {
    const container = document.getElementById('resultsContainer');
    const showFullPattern = document.getElementById('showFullPattern').checked;
    
    let html = '';
    analyses.forEach((a, idx) => {
      if (a.error) {
        html += `<div class="result-box"><span class="warning">Error with "${a.p}": ${a.error}</span></div>`;
        return;
      }
      
      const mersenneBadge = a.isMersenne ? '<span class="success"> KNOWN MERSENNE</span>' : '<span class="warning"> NON‑MERSENNE</span>';
      
      html += `<div class="result-box">`;
      html += `<div style="display:flex; justify-content:space-between; align-items:center;">`;
      html += `<h3 style="margin:0;">p = ${a.p} (base ${a.base})</h3>`;
      html += mersenneBadge;
      html += `</div>`;
      
      if (showFullPattern) {
        html += `<div style="margin:15px 0;"><strong>Full pattern:</strong> <span class="pattern-display">${a.pattern}</span></div>`;
      } else {
        html += `<div style="margin:15px 0;"><strong>Pattern length:</strong> ${a.patternLength} bits</div>`;
      }
      
      // Block counts
      html += `<div class="stat-grid">`;
      html += `<div class="stat-item"><strong>Total known blocks:</strong> ${a.totalBlocks}</div>`;
      const topBlocks = Object.entries(a.blockCounts).filter(([b,c]) => c>0).sort((a,b) => b[1]-a[1]).slice(0,4);
      topBlocks.forEach(([block, count]) => {
        html += `<div class="stat-item">"${block}": ${count}×</div>`;
      });
      html += `</div>`;
      
      // Similarity
      if (a.similarTo.length) {
        html += `<div style="margin-top:10px;"><span class="success">✓ Pattern matches known Mersenne: ${a.similarTo.join(', ')}</span></div>`;
      }
      
      // Unusual features
      if (a.unusual.length) {
        html += `<div style="margin-top:10px;"><strong class="warning">Unusual features:</strong><ul>`;
        a.unusual.forEach(u => { html += `<li>${u}</li>`; });
        html += `</ul></div>`;
      }
      
      html += `</div>`;
    });
    
    container.innerHTML = html || '<div class="result-box">Enter numbers and click Analyze.</div>';
  }

  // Parse input (comma, tab, newline separated)
  function parseInput(input) {
    return input.split(/[\s,\n\t]+/).filter(s => s.trim().length > 0);
  }

  // Event handlers
  document.getElementById('analyzeBtn').addEventListener('click', () => {
    const input = document.getElementById('pInput').value;
    const numbers = parseInput(input);
    if (numbers.length === 0) {
      alert('Please enter at least one number.');
      return;
    }
    if (numbers.length > 100) {
      if (!confirm(`Analyzing ${numbers.length} numbers may be slow. Continue?`)) return;
    }
    
    const analyses = numbers.map(p => analyzeNumber(p));
    renderResults(analyses);
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    document.getElementById('pInput').value = '';
    document.getElementById('resultsContainer').innerHTML = '<div class="result-box">Enter numbers and click Analyze.</div>';
  });

  document.getElementById('compareMersenne').addEventListener('change', () => {
    const input = document.getElementById('pInput').value;
    if (input.trim()) document.getElementById('analyzeBtn').click();
  });

  document.getElementById('showFullPattern').addEventListener('change', () => {
    const input = document.getElementById('pInput').value;
    if (input.trim()) document.getElementById('analyzeBtn').click();
  });

  // Initial example analysis
  setTimeout(() => document.getElementById('analyzeBtn').click(), 100);
})();
</script>
</body>
</html>
