<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mersenne GRAMMAR – 5 k-Types – Author Martin Doina</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Courier New', monospace; background: #080812; color: #d0d0d0; padding: 20px; }
        .container { max-width: 1700px; margin: 0 auto; background: #12121e; padding: 25px; border-radius: 12px; border: 1px solid #2a2a40; }
        h1 { text-align: center; color: #ffd966; font-size: 1.3em; }
        .subtitle { text-align: center; color: #888; font-size: 0.8em; margin-bottom: 10px; }
        
        .grammar-box { background: #0a0a16; border: 2px solid #ffd966; padding: 14px; border-radius: 10px; text-align: center; margin-bottom: 12px; }
        .grammar-box .big { font-size: 1.2em; color: #ffd966; font-weight: bold; }
        .types { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
        .ktype { padding: 3px 8px; border-radius: 10px; font-size: 0.65em; font-weight: bold; }
        .kdiff { background: rgba(76,175,80,0.2); color: #4CAF50; border: 1px solid #4CAF50; }
        .k2pp { background: rgba(100,181,246,0.2); color: #64b5f6; border: 1px solid #64b5f6; }
        .k2pm { background: rgba(255,183,77,0.2); color: #ffb74d; border: 1px solid #ffb74d; }
        .ksingle { background: rgba(206,147,216,0.2); color: #ce93d8; border: 1px solid #ce93d8; }
        .ksq { background: rgba(255,138,101,0.2); color: #ff8a65; border: 1px solid #ff8a65; }
        
        .stats { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin: 8px 0; }
        .stat { background: #0a0a16; padding: 6px 12px; border-radius: 5px; border: 1px solid #2a2a40; text-align: center; }
        .stat .v { color: #ffd966; font-weight: bold; font-size: 1.1em; }
        .stat .l { font-size: 0.6em; color: #888; }
        
        button { padding: 8px 14px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; font-family: 'Courier New', monospace; margin: 3px; }
        .gold { background: #ffd966; color: #000; }
        button:hover { opacity: 0.85; }
        
        #status { color: #ffd966; margin: 5px 0; text-align: center; font-size: 0.8em; }
        #output { background: #0a0a16; padding: 12px; border-radius: 8px; max-height: 550px; overflow-y: auto; font-size: 9px; margin-top: 8px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a1a30; color: #ffd966; padding: 4px; position: sticky; top: 0; font-size: 8px; }
        td { padding: 2px 4px; border-bottom: 1px solid #1a1a30; text-align: center; font-size: 8px; }
        tr.found { background: rgba(26,58,42,0.2); }
        tr.miss { background: rgba(58,26,26,0.3); }
        .ok { color: #4CAF50; font-weight: bold; }
        .no { color: #f44336; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1> Mersenne GRAMMAR — 5 k-Types Complete</h1>
    <div class="subtitle">Author: Martin Doina | p<sub>e</sub> = m²×(p<sub>a</sub>×p<sub>b</sub>) ± k | Added: p<sub>c</sub>²</div>
    
    <div class="grammar-box">
        <span class="big">p<sub>e</sub> = m² × (p<sub>a</sub> × p<sub>b</sub>) ± k</span>
        <div class="types">
            <span class="ktype kdiff">diff: p<sub>c</sub>−p<sub>d</sub></span>
            <span class="ktype k2pp">2p+p: 2p<sub>c</sub>+p<sub>d</sub></span>
            <span class="ktype k2pm">2p-p: 2p<sub>c</sub>−p<sub>d</sub></span>
            <span class="ktype ksingle">single: ±p<sub>c</sub></span>
            <span class="ktype ksq">square: p<sub>c</sub>² ± p<sub>d</sub></span>
        </div>
    </div>
    
    <div class="stats">
        <div class="stat"><div class="v" id="sFound">-</div><div class="l">Found</div></div>
        <div class="stat"><div class="v" id="sGaps">-</div><div class="l">Gaps</div></div>
    </div>
    
    <div style="text-align:center;">
        <button class="gold" onclick="runAll()">▶ Run ALL with 5 k-Types</button>
        <span id="status"></span>
    </div>
    <div id="output"></div>
</div>

<script>
(function(){
    const E = [2,3,5,7,13,17,19,31,61,89,107,127,521,607,1279,2203,2281,3217,4253,4423,
        9689,9941,11213,19937,21701,23209,44497,86243,110503,132049,216091,756839,
        859433,1257787,1398269,2976221,3021377,6972593,13466917,20996011,24036583,
        25964951,30402457,32582657,37156667,42643801,43112609,57885161,74207281,
        77232917,82589933,136279841];
    
    function L(i) { return 'M'+(i+1); }
    
    function buildKMap(maxI) {
        const kmap = new Map();
        function add(k, type, pc, pd, ci, di) {
            if (!kmap.has(k)) kmap.set(k, []);
            kmap.get(k).push({ type, pc, pd, ci, di });
        }
        
        for (let c = 0; c < maxI; c++) {
            for (let d = 0; d < maxI; d++) {
                add(E[c] - E[d], 'diff', E[c], E[d], c, d);
                add(2*E[c] + E[d], '2p+p', E[c], E[d], c, d);
                add(2*E[c] - E[d], '2p-p', E[c], E[d], c, d);
                // NEW: square types
                add(E[c]*E[c] + E[d], 'sq+', E[c], E[d], c, d);
                add(E[c]*E[c] - E[d], 'sq-', E[c], E[d], c, d);
            }
            add(E[c], 'single', E[c], 0, c, -1);
            add(-E[c], 'single', -E[c], 0, c, -1);
            // square alone
            add(E[c]*E[c], 'sq', E[c], 0, c, -1);
            add(-E[c]*E[c], 'sq', -E[c], 0, c, -1);
        }
        return kmap;
    }
    
    function findFormula(idx) {
        const T = E[idx], N = idx;
        const kmap = buildKMap(N);
        
        // Try m=1 ALL pairs
        for (let a = 0; a < N; a++) {
            for (let b = 0; b < N; b++) {
                const prod = E[a] * E[b];
                const k = T - prod;
                if (kmap.has(k)) return { m:1, a, b, prod, scaled:prod, k, kInfo:kmap.get(k)[0] };
            }
        }
        
        // Try m>1
        const MAXM = 5000;
        for (let a = 0; a < N; a++) {
            for (let b = 0; b < N; b++) {
                const prod = E[a] * E[b];
                if (prod === 0) continue;
                const estM = Math.round(Math.sqrt(T / prod));
                const lo = Math.max(2, estM - 100);
                const hi = Math.min(MAXM, estM + 100);
                
                for (let m = lo; m <= hi; m++) {
                    const scaled = prod * m * m;
                    const k = T - scaled;
                    if (kmap.has(k)) return { m, a, b, prod, scaled, k, kInfo:kmap.get(k)[0] };
                }
            }
        }
        return null;
    }
    
    function runAll() {
        let html = '<table><thead><tr><th>M#</th><th>p_e</th><th>m</th><th>p_a</th><th>p_b</th><th>Prod</th><th>m²×Prod</th><th>k</th><th>k-Type</th><th>✓</th></tr></thead><tbody>';
        let found = 0, gaps = [], i = 2;
        
        function processNext() {
            if (i >= E.length) {
                html += '</tbody></table>';
                const tot = E.length - 2;
                html += '<div style="text-align:center; margin-top:10px; font-size:1.1em;">';
                if (gaps.length === 0) {
                    html += '<span style="color:#4CAF50; font-size:1.4em;"> 50/50 — GRAMMAR COMPLETE!</span>';
                    html += '<br><span style="color:#ffd966;">The Mersenne Ring is CLOSED with 5 k-types.</span>';
                } else {
                    html += '<strong style="color:#4CAF50;">' + found + '/' + tot + ' FOUND</strong>';
                    html += ' <span style="color:#f44336;">Gaps: ' + gaps.map(x=>L(x)).join(', ') + '</span>';
                }
                html += '</div>';
                document.getElementById('output').innerHTML = html;
                document.getElementById('status').textContent = 'Done: ' + found + '/' + tot;
                document.getElementById('sFound').textContent = found + '/' + tot;
                document.getElementById('sGaps').textContent = gaps.length;
                return;
            }
            
            document.getElementById('status').textContent = L(i) + '...';
            const r = findFormula(i);
            
            if (r) {
                found++;
                html += '<tr class="found">';
                html += '<td><strong>' + L(i) + '</strong></td>';
                html += '<td><strong>' + E[i].toLocaleString() + '</strong></td>';
                html += '<td>' + r.m + '</td>';
                html += '<td>' + E[r.a].toLocaleString() + '</td>';
                html += '<td>' + E[r.b].toLocaleString() + '</td>';
                html += '<td>' + r.prod.toLocaleString() + '</td>';
                html += '<td>' + r.scaled.toLocaleString() + '</td>';
                html += '<td style="color:#ffd966;">' + r.k.toLocaleString() + '</td>';
                html += '<td>' + r.kInfo.type + '</td>';
                html += '<td class="ok">✅</td></tr>';
            } else {
                gaps.push(i);
                html += '<tr class="miss">';
                html += '<td><strong>' + L(i) + '</strong></td>';
                html += '<td><strong>' + E[i].toLocaleString() + '</strong></td>';
                html += '<td colspan="8" class="no">❌</td></tr>';
            }
            i++;
            setTimeout(processNext, 1);
        }
        processNext();
    }
    
    window.runAll = runAll;
    setTimeout(runAll, 300);
})();
</script>
</body>
</html>
