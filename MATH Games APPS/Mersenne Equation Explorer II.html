<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mersenne Equation Explorer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a237e 0%, #311b92 100%);
            color: #e3f2fd;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: rgba(26, 35, 126, 0.85);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #c5cae9;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .subtitle {
            text-align: center;
            margin-bottom: 30px;
            color: #ffb74d;
            font-style: italic;
            font-size: 1.1em;
        }
        
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .panel {
            background: rgba(49, 27, 146, 0.6);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .panel h2 {
            color: #ffb74d;
            margin-bottom: 15px;
            font-size: 1.2em;
            border-bottom: 2px solid #7e57c2;
            padding-bottom: 8px;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #c5cae9;
            font-size: 0.9em;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            background-color: rgba(197, 202, 233, 0.1);
            border: 1px solid #7e57c2;
            border-radius: 6px;
            color: white;
            font-size: 16px;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #7e57c2 0%, #5e35b1 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            flex: 1;
            min-width: 120px;
        }
        
        button:hover {
            background: linear-gradient(135deg, #9575cd 0%, #7e57c2 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        
        .primary-btn {
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
        }
        
        .primary-btn:hover {
            background: linear-gradient(135deg, #ffb74d 0%, #ff9800 100%);
        }
        
        .results-section {
            background: rgba(49, 27, 146, 0.6);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 20px;
        }
        
        .equation-display {
            background: rgba(26, 35, 126, 0.8);
            border: 2px solid #ff9800;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
        }
        
        .equation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: #ffb74d;
            font-weight: bold;
        }
        
        .copy-section {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
            border: 1px solid #7e57c2;
        }
        
        .copy-text {
            font-family: 'Courier New', monospace;
            font-size: 20px;
            font-weight: bold;
            color: #ffcc80;
            word-break: break-all;
            padding: 10px;
            background: rgba(81, 45, 168, 0.3);
            border-radius: 5px;
            margin-bottom: 10px;
        }
        
        .copy-button {
            background: #ff9800;
            color: #1a237e;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        
        .copy-button:hover {
            background: #ffb74d;
        }
        
        .equation-item {
            background: rgba(81, 45, 168, 0.5);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 4px solid #ff9800;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .equation-math {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
        }
        
        .equation-value {
            background: rgba(255, 152, 0, 0.2);
            padding: 5px 10px;
            border-radius: 15px;
            color: #ffb74d;
            font-size: 14px;
            border: 1px solid #ff9800;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .stat-card {
            background: rgba(81, 45, 168, 0.5);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid rgba(179, 157, 219, 0.3);
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #ffcc80;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 14px;
            color: #c5cae9;
        }
        
        .filter-section {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: rgba(81, 45, 168, 0.5);
            border: 1px solid #7e57c2;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            color: white;
            font-size: 14px;
        }
        
        .filter-btn.active {
            background: #ff9800;
            border-color: #ff9800;
            color: #1a237e;
            font-weight: bold;
        }
        
        .warning {
            background: rgba(244, 67, 54, 0.2);
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid #f44336;
            margin: 15px 0;
        }
        
        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> Mersenne Equation Explorer</h1>
        <p class="subtitle">Finding equations where sums of Mersenne labels are equal: Mₐ + Mᵇ + ... = Mₓ + Mᵧ + ...</p>
        
        <div class="controls">
            <div class="panel">
                <h2> Search Parameters</h2>
                
                <div class="input-group">
                    <label>Number of terms on left side:</label>
                    <select id="leftTerms">
                        <option value="1">1 term</option>
                        <option value="2" selected>2 terms</option>
                        <option value="3">3 terms</option>
                        <option value="4">4 terms</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label>Number of terms on right side:</label>
                    <select id="rightTerms">
                        <option value="1">1 term</option>
                        <option value="2" selected>2 terms</option>
                        <option value="3">3 terms</option>
                        <option value="4">4 terms</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label>Minimum Mersenne index:</label>
                    <select id="minIndex">
                        <option value="1">M1 (2)</option>
                        <option value="2">M2 (3)</option>
                        <option value="3">M3 (5)</option>
                        <option value="4">M4 (7)</option>
                        <option value="5" selected>M5 (13)</option>
                        <option value="6">M6 (17)</option>
                        <option value="7">M7 (19)</option>
                        <option value="8">M8 (31)</option>
                        <option value="9">M9 (61)</option>
                        <option value="10">M10 (89)</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label>Maximum Mersenne index:</label>
                    <select id="maxIndex">
                        <option value="10">M10 (89)</option>
                        <option value="11">M11 (107)</option>
                        <option value="12">M12 (127)</option>
                        <option value="13">M13 (521)</option>
                        <option value="14">M14 (607)</option>
                        <option value="15" selected>M15 (1279)</option>
                        <option value="16">M16 (2203)</option>
                        <option value="17">M17 (2281)</option>
                        <option value="18">M18 (3217)</option>
                        <option value="19">M19 (4253)</option>
                        <option value="20">M20 (4423)</option>
                    </select>
                </div>
            </div>
            
            <div class="panel">
                <h2> Options</h2>
                
                <div class="input-group">
                    <label>Equation type:</label>
                    <select id="equationType">
                        <option value="all" selected>All valid equations</option>
                        <option value="balanced">Balanced (same terms each side)</option>
                        <option value="unbalanced">Unbalanced (different terms)</option>
                        <option value="minimal">Minimal terms (2+2)</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label>Sort by:</label>
                    <select id="sortBy">
                        <option value="sum">Sum value</option>
                        <option value="left">Left side terms</option>
                        <option value="right">Right side terms</option>
                        <option value="difference">Index difference</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label>Maximum equations to show:</label>
                    <select id="maxResults">
                        <option value="20">20 equations</option>
                        <option value="50" selected>50 equations</option>
                        <option value="100">100 equations</option>
                        <option value="200">200 equations</option>
                        <option value="500">500 equations</option>
                    </select>
                </div>
                
                <div class="button-group">
                    <button class="primary-btn" onclick="findEquations()"> Find Equations</button>
                    <button onclick="resetToDefaults()">↺ Reset</button>
                </div>
            </div>
        </div>
        
        <div class="results-section">
            <h2> Found Equations</h2>
            
            <div id="statsContainer" class="stats-grid" style="display: none;">
                <div class="stat-card">
                    <div class="stat-value" id="totalEquations">0</div>
                    <div class="stat-label">Total Equations</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="uniqueSums">0</div>
                    <div class="stat-label">Unique Sums</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="minSum">0</div>
                    <div class="stat-label">Smallest Sum</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="maxSum">0</div>
                    <div class="stat-label">Largest Sum</div>
                </div>
            </div>
            
            <div id="copySection" class="copy-section" style="display: none;">
                <h3 style="color: #ff9800; margin-bottom: 10px;"> Copy All Equations (M Format)</h3>
                <div id="copyableText" class="copy-text"></div>
                <button class="copy-button" onclick="copyAllToClipboard()"> Copy to Clipboard</button>
            </div>
            
            <div id="filterSection" class="filter-section" style="display: none;">
                <!-- Dynamic filter buttons will appear here -->
            </div>
            
            <div id="equationsList" style="margin-top: 20px;">
                <!-- Equations will appear here -->
            </div>
            
            <div id="warning" class="warning" style="display: none;">
                <!-- Warning messages -->
            </div>
        </div>
    </div>

    <script>
        // All known Mersenne exponents with their labels
        const MERSENNES = [
            {label:"M01",value:2},{label:"M02",value:3},{label:"M03",value:5},
            {label:"M04",value:7},{label:"M05",value:13},{label:"M06",value:17},
            {label:"M07",value:19},{label:"M08",value:31},{label:"M09",value:61},
            {label:"M10",value:89},{label:"M11",value:107},{label:"M12",value:127},
            {label:"M13",value:521},{label:"M14",value:607},{label:"M15",value:1279},
            {label:"M16",value:2203},{label:"M17",value:2281},{label:"M18",value:3217},
            {label:"M19",value:4253},{label:"M20",value:4423},{label:"M21",value:9689},
            {label:"M22",value:9941},{label:"M23",value:11213},{label:"M24",value:19937},
            {label:"M25",value:21701},{label:"M26",value:23209},{label:"M27",value:44497},
            {label:"M28",value:86243},{label:"M29",value:110503},{label:"M30",value:132049},
            {label:"M31",value:216091},{label:"M32",value:756839},{label:"M33",value:859433},
            {label:"M34",value:1257787},{label:"M35",value:1398269},{label:"M36",value:2976221},
            {label:"M37",value:3021377},{label:"M38",value:6972593},{label:"M39",value:13466917},
            {label:"M40",value:20996011},{label:"M41",value:24036583},{label:"M42",value:25964951},
            {label:"M43",value:30402457},{label:"M44",value:32582657},{label:"M45",value:37156667},
            {label:"M46",value:42643801},{label:"M47",value:43112609},{label:"M48",value:57885161},
            {label:"M49",value:74207281},{label:"M50",value:77232917},{label:"M51",value:82589933},
            {label:"M52",value:136279841}
        ];

        let currentEquations = [];
        
        function getMersenneByIndex(index) {
            return MERSENNES.find(m => parseInt(m.label.substring(1)) === index);
        }
        
        function formatEquation(leftIndices, rightIndices, sum) {
            const left = leftIndices.map(i => `M${i.toString().padStart(2, '0')}`).join(' + ');
            const right = rightIndices.map(i => `M${i.toString().padStart(2, '0')}`).join(' + ');
            return {
                display: `${left} = ${right} (sum: ${sum})`,
                clean: `${left} = ${right}`,
                left: leftIndices,
                right: rightIndices,
                sum: sum
            };
        }
        
        function findEquations() {
            const leftTerms = parseInt(document.getElementById('leftTerms').value);
            const rightTerms = parseInt(document.getElementById('rightTerms').value);
            const minIndex = parseInt(document.getElementById('minIndex').value);
            const maxIndex = parseInt(document.getElementById('maxIndex').value);
            const equationType = document.getElementById('equationType').value;
            const sortBy = document.getElementById('sortBy').value;
            const maxResults = parseInt(document.getElementById('maxResults').value);
            
            // Get available Mersenne numbers in range
            const available = MERSENNES.filter(m => {
                const index = parseInt(m.label.substring(1));
                return index >= minIndex && index <= maxIndex;
            });
            
            if (available.length === 0) {
                showWarning('No Mersenne numbers in selected range');
                return;
            }
            
            // Generate all combinations
            const leftCombinations = getCombinations(available.map(m => parseInt(m.label.substring(1))), leftTerms);
            const rightCombinations = getCombinations(available.map(m => parseInt(m.label.substring(1))), rightTerms);
            
            const equations = new Map(); // Use Map to avoid duplicates (keyed by sum + left/right)
            
            // Calculate sums for left combinations
            leftCombinations.forEach(leftIndices => {
                const leftSum = leftIndices.reduce((sum, idx) => {
                    const m = MERSENNES.find(m => parseInt(m.label.substring(1)) === idx);
                    return sum + m.value;
                }, 0);
                
                // Find matching right combinations
                rightCombinations.forEach(rightIndices => {
                    // Skip if left and right are identical sets (for balanced equations)
                    if (equationType === 'balanced' && 
                        JSON.stringify(leftIndices.sort()) === JSON.stringify(rightIndices.sort())) {
                        return;
                    }
                    
                    const rightSum = rightIndices.reduce((sum, idx) => {
                        const m = MERSENNES.find(m => parseInt(m.label.substring(1)) === idx);
                        return sum + m.value;
                    }, 0);
                    
                    if (Math.abs(leftSum - rightSum) < 0.1) { // Allow for floating point
                        const key = `${leftIndices.sort().join(',')}|${rightIndices.sort().join(',')}`;
                        if (!equations.has(key)) {
                            equations.set(key, {
                                left: leftIndices,
                                right: rightIndices,
                                sum: leftSum
                            });
                        }
                    }
                });
            });
            
            // Convert to array and sort
            currentEquations = Array.from(equations.values());
            
            // Apply equation type filter
            if (equationType === 'balanced') {
                currentEquations = currentEquations.filter(e => e.left.length === e.right.length);
            } else if (equationType === 'unbalanced') {
                currentEquations = currentEquations.filter(e => e.left.length !== e.right.length);
            } else if (equationType === 'minimal') {
                currentEquations = currentEquations.filter(e => e.left.length === 2 && e.right.length === 2);
            }
            
            // Sort
            currentEquations.sort((a, b) => {
                if (sortBy === 'sum') return a.sum - b.sum;
                if (sortBy === 'left') return a.left.length - b.left.length;
                if (sortBy === 'right') return a.right.length - b.right.length;
                return a.sum - b.sum;
            });
            
            // Limit results
            currentEquations = currentEquations.slice(0, maxResults);
            
            // Display
            displayEquations(currentEquations);
        }
        
        function getCombinations(arr, k) {
            if (k === 1) return arr.map(item => [item]);
            if (arr.length < k) return [];
            
            const combinations = [];
            
            function combine(start, current) {
                if (current.length === k) {
                    combinations.push([...current]);
                    return;
                }
                
                for (let i = start; i < arr.length; i++) {
                    current.push(arr[i]);
                    combine(i + 1, current);
                    current.pop();
                }
            }
            
            combine(0, []);
            return combinations;
        }
        
        function displayEquations(equations) {
            const statsDiv = document.getElementById('statsContainer');
            const copySection = document.getElementById('copySection');
            const equationsList = document.getElementById('equationsList');
            const filterSection = document.getElementById('filterSection');
            const warningDiv = document.getElementById('warning');
            
            if (equations.length === 0) {
                showWarning('No equations found with current parameters');
                statsDiv.style.display = 'none';
                copySection.style.display = 'none';
                filterSection.style.display = 'none';
                return;
            }
            
            // Update stats
            statsDiv.style.display = 'grid';
            document.getElementById('totalEquations').textContent = equations.length;
            
            const uniqueSums = new Set(equations.map(e => e.sum)).size;
            document.getElementById('uniqueSums').textContent = uniqueSums;
            
            const sums = equations.map(e => e.sum);
            document.getElementById('minSum').textContent = Math.min(...sums);
            document.getElementById('maxSum').textContent = Math.max(...sums);
            
            // Create clean copyable text
            const cleanText = equations.map(e => {
                const left = e.left.map(i => `M${i.toString().padStart(2, '0')}`).join(' + ');
                const right = e.right.map(i => `M${i.toString().padStart(2, '0')}`).join(' + ');
                return `${left} = ${right}`;
            }).join('\n');
            
            copySection.style.display = 'block';
            document.getElementById('copyableText').textContent = cleanText;
            
            // Create filter buttons for sums
            filterSection.style.display = 'flex';
            const uniqueSumValues = [...new Set(equations.map(e => e.sum))].sort((a,b) => a - b).slice(0, 10);
            
            let filterHTML = '<button class="filter-btn active" onclick="filterBySum(\'all\')">All</button>';
            uniqueSumValues.forEach(sum => {
                filterHTML += `<button class="filter-btn" onclick="filterBySum(${sum})">Sum: ${sum}</button>`;
            });
            filterSection.innerHTML = filterHTML;
            
            // Display equations
            let html = '<h3> Equations Found:</h3>';
            
            // Group by sum for better visualization
            const grouped = {};
            equations.forEach(eq => {
                if (!grouped[eq.sum]) grouped[eq.sum] = [];
                grouped[eq.sum].push(eq);
            });
            
            Object.keys(grouped).sort((a,b) => a - b).forEach(sum => {
                html += `<div style="margin: 20px 0 10px 0; color: #ffb74d; font-weight: bold;">Sum = ${sum}:</div>`;
                
                grouped[sum].forEach(eq => {
                    const left = eq.left.map(i => `M${i.toString().padStart(2, '0')}`).join(' + ');
                    const right = eq.right.map(i => `M${i.toString().padStart(2, '0')}`).join(' + ');
                    
                    html += `
                        <div class="equation-item">
                            <span class="equation-math">${left} = ${right}</span>
                            <span class="equation-value">${eq.left.length}+${eq.right.length} terms</span>
                        </div>
                    `;
                });
            });
            
            equationsList.innerHTML = html;
            warningDiv.style.display = 'none';
        }
        
        function filterBySum(sum) {
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(sum) || (sum === 'all' && btn.textContent === 'All')) {
                    btn.classList.add('active');
                }
            });
            
            if (sum === 'all') {
                displayEquations(currentEquations);
            } else {
                const filtered = currentEquations.filter(e => Math.abs(e.sum - sum) < 0.1);
                displayEquations(filtered);
            }
        }
        
        function copyAllToClipboard() {
            const copyText = document.getElementById('copyableText').textContent;
            navigator.clipboard.writeText(copyText).then(() => {
                alert(' All equations copied to clipboard!');
            }).catch(err => {
                alert(' Failed to copy text');
            });
        }
        
        function showWarning(message) {
            document.getElementById('warning').style.display = 'block';
            document.getElementById('warning').innerHTML = ` ${message}`;
            document.getElementById('statsContainer').style.display = 'none';
            document.getElementById('copySection').style.display = 'none';
            document.getElementById('filterSection').style.display = 'none';
            document.getElementById('equationsList').innerHTML = '';
        }
        
        function resetToDefaults() {
            document.getElementById('leftTerms').value = '2';
            document.getElementById('rightTerms').value = '2';
            document.getElementById('minIndex').value = '5';
            document.getElementById('maxIndex').value = '15';
            document.getElementById('equationType').value = 'all';
            document.getElementById('sortBy').value = 'sum';
            document.getElementById('maxResults').value = '50';
            findEquations();
        }
        
        // Run initial search on load
        window.onload = function() {
            resetToDefaults();
        };
    </script>
</body>
</html>
